<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안전수칙 방탈출 게임</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Google Translate Script -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({
        pageLanguage: 'ko',
        includedLanguages: 'ko,ru',
        layout: google.translate.TranslateElement.InlineLayout.SIMPLE
      }, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

  <style>
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .animate-fade-in { animation: fadeIn 0.5s ease-out; }
    
    /* 드래그 앤 드롭 애니메이션 및 터치 환경 스크롤 방지 */
    .drag-item { 
      transition: transform 0.2s ease, box-shadow 0.2s ease; 
      touch-action: none; /* 태블릿 등에서 드래그 시 화면 스크롤 방지 */
    }
    .dragging { 
      opacity: 0.8; 
      transform: scale(1.02); 
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); 
      z-index: 50;
    }

    /* 구글 번역기 위젯 스타일 다듬기 */
    .goog-te-banner-frame.skiptranslate { display: none !important; }
    body { top: 0px !important; }
    .goog-te-gadget { font-family: inherit !important; font-size: 0 !important; color: transparent !important; display: flex; align-items: center; }
    .goog-te-gadget .goog-te-combo { 
      font-size: 14px !important; 
      font-weight: bold;
      color: #3730a3 !important; 
      margin: 0; 
      padding: 6px 12px; 
      border-radius: 8px; 
      border: 2px solid #c7d2fe; 
      outline: none; 
      cursor: pointer;
    }
    .goog-te-gadget span { display: none !important; }
  </style>
</head>
<body class="bg-slate-50 font-sans text-gray-800 pb-12">
  <!-- 번역기 위치 -->
  <div class="fixed top-4 right-4 z-50 bg-white/80 backdrop-blur-sm p-2 rounded-xl shadow-sm border border-indigo-50">
    <div id="google_translate_element"></div>
  </div>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    const apiKey = "AIzaSyCf6g-krNLCuA5m1HmH5k0DsJkkAAFgMmw"; // ⚠️ 선생님의 Gemini API 키를 여기에 붙여넣으세요!

    const callGemini = async (prompt, systemInstruction) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] }
      };

      let retries = 5;
      let delay = 1000;

      while (retries > 0) {
        try {
          const response = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          
          if (!response.ok) throw new Error('API Error');
          const data = await response.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "오류가 발생했습니다. 다시 시도해주세요!";
        } catch (error) {
          retries -= 1;
          if (retries === 0) return "AI 요정이 지금 조금 바쁜가 봐요. 잠시 후 다시 시도해주세요! 🧚‍♀️";
          await new Promise(resolve => setTimeout(resolve, delay));
          delay *= 2;
        }
      }
    };

    function App() {
      const [currentScreen, setCurrentScreen] = useState('intro');
      
      const [m1Progress, setM1Progress] = useState({ 
        g1: false, g2: false, g3: false, g4: false, g5: false, g6: false, g7: false, g8: false 
      });
      const [activeGroup, setActiveGroup] = useState(null);
      const [m1Message, setM1Message] = useState('');

      // 공통 카메라 & 연기/인증 미션 States
      const [isImageVerifyOpen, setIsImageVerifyOpen] = useState(false);
      const [currentActionText, setCurrentActionText] = useState('');
      const [isImageChecking, setIsImageChecking] = useState(false);
      const [imageCheckResult, setImageCheckResult] = useState('');
      const [capturedImg, setCapturedImg] = useState(null);
      const [savedPhotos, setSavedPhotos] = useState([]); // 찍은 사진들 모아두는 갤러리 State
      const videoRef = useRef(null);
      const [isCameraActive, setIsCameraActive] = useState(false);
      const [stream, setStream] = useState(null);
      const [cameraError, setCameraError] = useState(false);

      // 2모둠: 소화기 드래그형 퍼즐 States
      const [isG2DnDOpen, setIsG2DnDOpen] = useState(false);
      const initialDndItems = [
        { id: 3, text: "손잡이를 강하게 움켜쥔다." },
        { id: 1, text: "소화기의 안전핀을 뽑는다." },
        { id: 4, text: "불을 향해 빗자루로 쓸듯이 골고루 뿌린다." },
        { id: 2, text: "바람을 등지고 서서 호스를 빼서 불이 난 곳을 향한다." }
      ];
      const [dndItems, setDndItems] = useState([...initialDndItems]);
      const [draggingIdx, setDraggingIdx] = useState(null);
      const dragItemRef = useRef(null);

      // Mission 2 (야외 숲) States
      const [m2Answers, setM2Answers] = useState(Array(6).fill(null));
      const [m2Message, setM2Message] = useState('');
      const [randomCondition, setRandomCondition] = useState('');

      // Mission 3 (디지털 방) States
      const [m3Input, setM3Input] = useState('');
      const [m3Message, setM3Message] = useState('');
      const [hintStyle, setHintStyle] = useState('');
      const [aiHint, setAiHint] = useState('');
      const [isHintLoading, setIsHintLoading] = useState(false);

      // Certificate States
      const [teamFeature, setTeamFeature] = useState('');
      const [aiCertificate, setAiCertificate] = useState('');
      const [isCertLoading, setIsCertLoading] = useState(false);

      const isM2Solved = m2Message.includes('훌륭');
      const isM3Solved = m3Message.includes('성공');

      // --- 상단 진행 상태 표시바 ---
      const renderProgressBar = () => {
        if (currentScreen === 'intro') return null;

        const steps = [
          { id: 'mission1', name: '🧪 실험실' },
          { id: 'mission2', name: '🌲 야외 숲' },
          { id: 'mission3', name: '💻 해커방' },
          { id: 'certificate', name: '🏆 명예의 전당' }
        ];

        const currentIndex = steps.findIndex(s => s.id === currentScreen);

        return (
          <div className="flex flex-wrap justify-center items-center gap-2 md:gap-3 mb-8 mt-4 px-4 w-full animate-fade-in text-sm md:text-base font-bold">
            {steps.map((step, index) => {
              const isActive = index === currentIndex;
              const isPassed = index < currentIndex;
              return (
                <React.Fragment key={step.id}>
                  <div className={`flex items-center gap-1 md:gap-2 px-4 py-2 rounded-full transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg transform scale-105' : isPassed ? 'bg-indigo-100 text-indigo-700' : 'bg-gray-200 text-gray-400'}`}>
                    {step.name}
                  </div>
                  {index < steps.length - 1 && (
                    <div className={`text-lg md:text-xl ${isPassed ? 'text-indigo-400' : 'text-gray-300'}`}>▶</div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        );
      };

      const Button = ({ onClick, children, className = '', disabled = false }) => (
        <button
          onClick={onClick} disabled={disabled}
          className={`px-6 py-3 rounded-xl font-bold text-lg transition-all duration-200 transform active:scale-95 shadow-md flex items-center justify-center gap-2 ${disabled ? 'opacity-50 cursor-not-allowed' : 'hover:shadow-lg'} ${className}`}
        >
          {children}
        </button>
      );

      const TitleBox = ({ title, subtitle, icon }) => (
        <div className="text-center mb-8 bg-white p-6 rounded-2xl shadow-sm border-2 border-indigo-100 mt-4 md:mt-0">
          <div className="flex justify-center mb-3">
            {icon && <div className="text-[3rem] leading-none drop-shadow-sm">{icon}</div>}
          </div>
          <h1 className="text-3xl font-extrabold text-gray-800 mb-2">{title}</h1>
          <p className="text-lg text-gray-600">{subtitle}</p>
        </div>
      );

      const MessageBox = ({ message, type = 'success' }) => {
        if (!message) return null;
        return (
          <div className={`mt-6 p-4 rounded-xl flex items-center justify-center gap-3 animate-bounce shadow-md
            ${type === 'success' ? 'bg-green-100 text-green-800 border-2 border-green-300' : 
              type === 'error' ? 'bg-red-100 text-red-800 border-2 border-red-300' : 
              'bg-blue-100 text-blue-800 border-2 border-blue-300'}`}>
            {type === 'success' && <span className="text-2xl flex-shrink-0">✅</span>}
            {type === 'error' && <span className="text-2xl flex-shrink-0">❌</span>}
            <p className="font-bold text-lg break-keep">{message}</p>
          </div>
        );
      };

      const goHome = () => {
        if(window.confirm("정말 처음으로 돌아가시겠습니까? 진행 중인 내용이 모두 사라집니다.")) {
          stopCamera();
          setM1Progress({ g1: false, g2: false, g3: false, g4: false, g5: false, g6: false, g7: false, g8: false });
          setM2Answers(Array(6).fill(null));
          setRandomCondition('');
          setM3Input(''); setHintStyle(''); setAiHint(''); setTeamFeature(''); setAiCertificate('');
          setM1Message(''); setM2Message(''); setM3Message('');
          setActiveGroup(null);
          setIsImageVerifyOpen(false);
          setIsG2DnDOpen(false);
          setSavedPhotos([]); 
          setCurrentScreen('intro');
        }
      };

      useEffect(() => {
        return () => stopCamera();
      }, [stream]);

      // --- M1 Functions ---
      const handleM1Choice = (group, isCorrect, actionText = "") => {
        if (isCorrect) {
          if (group === 'g2') {
            setDndItems([...initialDndItems]); // 드래그 앤 드롭 초기화
            setIsG2DnDOpen(true);
          } else {
            setCurrentActionText(actionText);
            setIsImageVerifyOpen(true);
            setImageCheckResult('');
            setCapturedImg(null);
            setCameraError(false);
          }
        } else {
          setM1Message('앗! 올바른 행동이나 정답이 아니에요. 다시 생각해보세요!');
          setTimeout(() => setM1Message(''), 2000);
        }
      };

      const startCamera = async () => {
        setCameraError(false);
        try {
          // 모바일/태블릿 등에서 교실 사물을 찍기 편하도록 후면 카메라(environment) 우선 호출
          const mediaStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } } });
          setStream(mediaStream);
          setIsCameraActive(true);
          setTimeout(() => {
            if (videoRef.current) videoRef.current.srcObject = mediaStream;
          }, 100);
        } catch (err) {
          console.error("Camera error:", err);
          setCameraError(true);
        }
      };

      const stopCamera = () => {
        if (stream) {
          stream.getTracks().forEach(track => track.stop());
          setStream(null);
          setIsCameraActive(false);
        }
      };

      const takePhotoAndCheck = () => {
        if (!videoRef.current) return;
        const canvas = document.createElement('canvas');
        canvas.width = videoRef.current.videoWidth;
        canvas.height = videoRef.current.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(videoRef.current, 0, 0);
        const dataUrl = canvas.toDataURL('image/jpeg');
        setCapturedImg(dataUrl);
        stopCamera(); 
      };

      const retakePhoto = () => {
        setCapturedImg(null); setImageCheckResult(''); startCamera();
      };

      const submitPhoto = () => {
        setIsImageChecking(true);
        setImageCheckResult('AI 요정이 모둠원들의 사진을 확인하고 있어요... 🔍');
        setTimeout(() => {
          setImageCheckResult('정답: 미션 완벽하게 성공! 📸✨');
          setIsImageChecking(false);
          setSavedPhotos(prev => [...prev, { group: activeGroup.replace('g', ''), img: capturedImg }]);
        }, 3000);
      };

      const handleTeacherBypass = () => {
        setImageCheckResult('선생님 확인 완료! 멋진 모습이었습니다! 🎬✨');
        setIsImageChecking(false);
      };

      const completeGroupMission = () => {
        const groupNum = activeGroup.replace('g', '');
        setM1Message(`완벽합니다! ${groupNum}모둠 미션 성공! 🎉 (아래 버튼을 눌러 목록으로 돌아가세요)`);
        setM1Progress(prev => ({ ...prev, [activeGroup]: true }));
        setCameraError(false);
      };

      // 데스크탑 마우스 드래그 이벤트 (g2)
      const handleDragStart = (e, index) => {
        if (m1Progress.g2 || !isG2DnDOpen) return; 
        dragItemRef.current = index;
        e.dataTransfer.effectAllowed = 'move';
        setTimeout(() => setDraggingIdx(index), 0);
      };

      const handleDragEnter = (e, targetIndex) => {
        if (m1Progress.g2 || !isG2DnDOpen) return; 
        e.preventDefault();
        const dragIndex = dragItemRef.current;
        if (dragIndex === null || dragIndex === targetIndex) return;

        const newItems = [...dndItems];
        const draggedItem = newItems.splice(dragIndex, 1)[0];
        newItems.splice(targetIndex, 0, draggedItem);
        
        dragItemRef.current = targetIndex;
        setDndItems(newItems);

        checkG2DnDSuccess(newItems);
      };

      const handleDragEnd = () => {
        setDraggingIdx(null); dragItemRef.current = null;
      };

      // 태블릿/모바일 터치 전용 드래그 이벤트 (g2)
      const handleTouchStart = (e, index) => {
        if (m1Progress.g2 || !isG2DnDOpen) return;
        dragItemRef.current = index;
        setDraggingIdx(index);
      };

      const handleTouchMove = (e) => {
        if (m1Progress.g2 || !isG2DnDOpen || dragItemRef.current === null) return;
        
        const touch = e.touches[0];
        const target = document.elementFromPoint(touch.clientX, touch.clientY);
        if (!target) return;

        const targetElement = target.closest('.drag-item');
        if (!targetElement || targetElement.dataset.index === undefined) return;

        const targetIndex = parseInt(targetElement.dataset.index, 10);
        const dragIndex = dragItemRef.current;
        
        if (dragIndex === targetIndex) return;

        const newItems = [...dndItems];
        const draggedItem = newItems.splice(dragIndex, 1)[0];
        newItems.splice(targetIndex, 0, draggedItem);
        
        dragItemRef.current = targetIndex;
        setDndItems(newItems);

        checkG2DnDSuccess(newItems);
      };

      const handleTouchEnd = () => {
        setDraggingIdx(null); dragItemRef.current = null;
      };

      // G2 드래그앤드롭 정답 확인 로직
      const checkG2DnDSuccess = (items) => {
        if (items[0].id === 1 && items[1].id === 2 && items[2].id === 3 && items[3].id === 4) {
          setM1Message('정답입니다! 🌟 올바른 소화기 사용법을 익혔네요! 자, 이제 불을 끄는 또 다른 도구인 진짜 "소화담요"를 찾아볼까요? (아래 버튼을 누르세요)');
        } else {
          setM1Message(''); // 순서가 틀려졌을 때 메시지 지우기
        }
      };

      const renderReviewContent = (groupId) => {
        const reviewData = {
          g1: { title: "눈에 약품이 튀었을 때", desc: "눈에 약품이 들어갔을 때는 '눈 세척기'를 이용하여 흐르는 물에 눈을 깨끗이 씻어내야 합니다.", icon: "👁️" },
          g2: { title: "실험 중 불이 났을 때", desc: "불이 났을 때는 '소화기'나 '소화담요'를 사용합니다.\n[소화기 사용법]\n1. 안전핀을 뽑는다.\n2. 바람을 등지고 서서 호스를 불 쪽으로 향한다.\n3. 손잡이를 움켜쥔다.\n4. 빗자루로 쓸듯이 뿌린다.", icon: "🔥" },
          g3: { title: "뜨거운 것에 데었을 때", desc: "화상을 입었을 때는 데인 부위를 '흐르는 차가운 물'로 충분히 식혀주어야 합니다.", icon: "💧" },
          g4: { title: "유리 비커가 깨졌을 때", desc: "유리가 깨졌을 때는 절대 맨손으로 만지지 말고, '선생님께 알린 후 빗자루와 쓰레받기'로 안전하게 치워야 합니다.", icon: "💥" },
          g5: { title: "약품 냄새를 맡을 때", desc: "약품의 냄새를 맡을 때는 코를 직접 대지 않고 '손으로 살살 부채질'을 하여 간접적으로 냄새를 맡아야 합니다.", icon: "👃" },
          g6: { title: "피부에 약품이 묻었을 때", desc: "피부에 약품이 묻었을 때는 수건으로 닦지 말고 '곧바로 흐르는 물에' 충분히 씻어내야 합니다.", icon: "🧴" },
          g7: { title: "실험하기 전 안전 복장", desc: "안전한 실험을 위해 반드시 '실험복, 보안경, 실험용 장갑'을 착용해야 합니다. 위험한 약품이 옷이나 피부, 눈에 튀는 것을 막아줍니다.", icon: "🥽" },
          g8: { title: "사용한 시약 버리기", desc: "실험 후 남은 시약이나 폐수(버리는 물)는 절대 세면대나 일반 쓰레기통에 버리면 안 됩니다. 반드시 성분별로 나누어 '지정된 폐수통'에 모아서 버려야 환경과 사람을 보호할 수 있습니다.", icon: "🛢️" }
        };
        const data = reviewData[groupId];
        if(!data) return null;

        return (
          <div className="bg-indigo-50 p-6 rounded-2xl border-2 border-indigo-200 text-left my-6 shadow-inner animate-fade-in">
            <div className="flex items-center gap-3 mb-3">
              <div className="text-3xl bg-white p-2 rounded-full shadow-sm">{data.icon}</div>
              <h3 className="text-xl md:text-2xl font-black text-indigo-900">{data.title}</h3>
            </div>
            <p className="text-lg text-indigo-800 whitespace-pre-line leading-relaxed font-bold break-keep ml-2">
              {data.desc}
            </p>
          </div>
        );
      };

      // --- M2 Functions (랜덤 조건 & 6문제) ---
      const pickRandomCondition = () => {
        const baseConditions = [
          "안경을 쓴 사람 👓", "오늘 아침에 밥(쌀)을 먹은 사람 🍚", "머리를 묶은 사람 👱‍♀️",
          "이름에 'ㅇ'이 들어가는 사람 🅾️", "오늘 가장 먼저 일어난 사람 ⏰",
          "우리 반에서 키가 가장 큰 사람 🦒", "가위바위보에서 이긴 사람 ✌️",
          "동물을 가장 좋아하는 사람 🐶", "옷이나 신발에 파란색이 있는 사람 🔵"
        ];
        
        const randomMonth = Math.floor(Math.random() * 12) + 1;
        const randomDay = Math.floor(Math.random() * 28) + 1;
        baseConditions.push(`생일이 ${randomMonth}월 ${randomDay}일인 사람 (또는 가장 가까운 사람!) 🎂`);

        const randomIndex = Math.floor(Math.random() * baseConditions.length);
        setRandomCondition(baseConditions[randomIndex]);
      };

      const handleM2Answer = (index, answer) => {
        if (isM2Solved) return;

        const newAnswers = [...m2Answers];
        newAnswers[index] = answer;
        setM2Answers(newAnswers);
        
        if (newAnswers.filter(a => a !== null).length === 6) {
          const correctAnswers = [false, false, true, true, false, true];
          const isAllCorrect = newAnswers.every((val, idx) => val === correctAnswers[idx]);

          if (isAllCorrect) {
            setM2Message('훌륭합니다! 야외 활동 안전 수칙을 완벽히 알았네요. 아래 버튼을 눌러 다음 방으로 이동하세요!');
          } else {
            setM2Message('틀린 문제가 있어요. 숲에서 다치면 안 되니 다시 꼼꼼히 읽어보세요!');
            setTimeout(() => {
              setM2Answers(Array(6).fill(null));
              setM2Message('');
            }, 3000);
          }
        }
      };

      // --- M3 Functions ---
      const handleM3Submit = () => {
        if (m3Input.trim() === '허락') {
          setM3Message('암호 해제 성공! 방탈출에 성공했습니다! 아래 버튼을 눌러주세요.');
        } else {
          setM3Message('삐빅- 암호가 틀렸습니다.');
          setTimeout(() => setM3Message(''), 2000);
        }
      };

      const getAiHint = async () => {
        if (!hintStyle.trim()) { setAiHint("힌트 스타일을 먼저 입력해주세요!"); return; }
        setIsHintLoading(true); setAiHint("");
        const systemPrompt = "초등학교 3~4학년을 위한 다정한 AI 힌트 요정입니다. 정답 단어는 '허락'입니다. 정답 '허락'을 직접 말하지 말고, 사용자가 요청한 스타일에 빙의해서 재미있게 힌트를 주세요.";
        const response = await callGemini(`"${hintStyle}" 스타일로 정답 힌트를 줘!`, systemPrompt);
        setAiHint(response); setIsHintLoading(false);
      };

      const getAiCertificate = async () => {
        if (!teamFeature.trim()) { setAiCertificate("우리 모둠의 특징을 먼저 입력해주세요!"); return; }
        setIsCertLoading(true);
        const systemPrompt = "비밀 과학 연구소의 최고 소장입니다. 안전 수칙 방탈출에 성공한 학생들에게 수여하는 멘트입니다. 사용자가 입력한 특징을 활용해 칭찬하는 활기찬 3~4줄짜리 축하 메시지를 작성해주세요. 이모지를 듬뿍 사용하세요.";
        const response = await callGemini(`우리 반/모둠의 특징은 "${teamFeature}"야. 이 특징을 넣어서 축하 멘트를 만들어줘!`, systemPrompt);
        setAiCertificate(response); setIsCertLoading(false);

      const renderIntro = () => (
        <div className="flex flex-col items-center justify-center min-h-[80vh] text-center px-4 animate-fade-in py-10 mt-10">
          <div className="bg-white p-10 rounded-3xl shadow-2xl max-w-2xl border-4 border-indigo-200">
            <div className="flex justify-center mb-6">
              <div className="text-[6rem] animate-pulse drop-shadow-md">🧪</div>
            </div>
            <h1 className="text-4xl md:text-5xl font-black text-gray-800 mb-6 drop-shadow-sm leading-tight">
              비밀 과학 연구소 <br/><span className="text-indigo-600">안전수칙 방탈출</span>
            </h1>
            <p className="text-xl text-gray-600 mb-10 leading-relaxed font-medium break-keep">
              여러분은 비밀 과학 연구소의 신입 연구원입니다!<br/>
              정식 연구원이 되려면 3개의 안전 수칙 방을 무사히 통과해야 합니다.<br/>
              <strong className="text-indigo-500">1~8모둠</strong>이 힘을 합쳐 미션을 해결하고 문을 여세요!
            </p>
            <Button 
              onClick={() => setCurrentScreen('mission1')}
              className="bg-indigo-600 text-white hover:bg-indigo-700 w-full md:w-auto text-xl py-4 px-10 rounded-full mx-auto"

              방탈출 시작하기 <span className="text-xl">▶️</span>
            </Button>
          </div>
        </div>
      );

      const renderMission1 = () => {
        const isAllComplete = m1Progress.g1 && m1Progress.g2 && m1Progress.g3 && m1Progress.g4 && m1Progress.g5 && m1Progress.g6 && m1Progress.g7 && m1Progress.g8;

        return (
          <div className="max-w-6xl mx-auto px-4 py-8 animate-fade-in">
            <TitleBox 
              title="제1의 방: 위기일발 실험실" 
              subtitle="실험실에 비상벨이 울립니다! 모든 모둠(1~8)이 알맞은 대처법을 찾아야 합니다."
              icon="🚨"
            />

            {!activeGroup ? (
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 md:gap-6 mb-8">
                {[
                  { id: 'g1', icon: '👁️', title: '눈에 약품이 튀었을 때' },
                  { id: 'g2', icon: '🔥', title: '실험 중 불이 났을 때' },
                  { id: 'g3', icon: '💧', title: '뜨거운 것에 데었을 때' },
                  { id: 'g4', icon: '💥', title: '유리 비커가 깨졌을 때' },
                  { id: 'g5', icon: '👃', title: '약품 냄새를 맡을 때' },
                  { id: 'g6', icon: '🧴', title: '피부에 약품이 묻었을 때' },
                  { id: 'g7', icon: '🥽', title: '실험 전 안전 복장' },
                  { id: 'g8', icon: '🛢️', title: '사용한 시약 버리기' },

                  <button 
                    key={g.id}
                    onClick={() => {
                      setActiveGroup(g.id);
                      if (m1Progress[g.id]) {
                        setIsImageVerifyOpen(false); setIsG2DnDOpen(false); setM1Message('');
                      }
                    }}
                    className={`p-4 md:p-6 rounded-2xl border-4 flex flex-col items-center transition-all cursor-pointer transform hover:-translate-y-1 ${
                      m1Progress[g.id] ? 'bg-green-100 border-green-400 hover:border-green-500 hover:shadow-xl' : 'bg-white border-blue-300 hover:border-blue-500 hover:shadow-xl'
                    }`}
                  >
                    <div className="text-xl md:text-2xl font-black mb-2 flex items-center gap-2">
                      {idx+1}모둠 {m1Progress[g.id] ? <span>🔓</span> : <span>🔒</span>}
                    </div>
                    <div className="text-[3rem] md:text-[4rem] mb-2">{g.icon}</div>
                    <p className="font-bold text-gray-700 text-center text-sm md:text-base break-keep">{g.title}</p>
                    {m1Progress[g.id] && <span className="mt-3 bg-green-500 text-white px-4 py-1.5 rounded-full text-xs md:text-sm font-bold shadow-sm">완료 (복습하기)</span>}

                    setIsImageVerifyOpen(false); setIsG2DnDOpen(false); setCameraError(false);
                  }}
                  className="absolute top-4 right-4 text-gray-500 hover:text-gray-800 font-bold bg-gray-100 hover:bg-gray-200 px-4 py-2 rounded-full z-10 transition-colors"
                >
                  ✕ 닫기
                </button>

                {m1Progress[activeGroup] && !isImageVerifyOpen && !isG2DnDOpen && (

                    <p className="text-gray-600 font-medium mb-4">우리 모둠이 배운 안전 수칙을 다시 한번 확인해봐요!</p>
                    {renderReviewContent(activeGroup)}
                    <Button onClick={() => setActiveGroup(null)} className="bg-indigo-600 hover:bg-indigo-700 text-white mx-auto mt-8 w-full md:w-auto px-10 py-4 text-xl rounded-full">
                      🔙 모둠 목록으로 돌아가기
                    </Button>
                  </div>
                )}

                {/* --- 퀴즈 문제 영역 --- */}
                {activeGroup === 'g1' && !isImageVerifyOpen && !m1Progress.g1 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-blue-600 mb-4">🚨 [1모둠] 눈에 약품이 튀었다!</h2>
                    <p className="text-lg md:text-xl mb-8">가장 먼저 가져와야 할 장비를 터치하세요!</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g1', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">소화기</button>
                      <button onClick={() => handleM1Choice('g1', true, "흐르는 물에 눈을 깨끗이 씻어내는 연기")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-blue-100">눈 세척기</button>
                      <button onClick={() => handleM1Choice('g1', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">비커</button>
                    </div>
                  </div>
                )}
                {activeGroup === 'g3' && !isImageVerifyOpen && !m1Progress.g3 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-orange-600 mb-4">🚨 [3모둠] 뜨거운 것에 데었다!</h2>
                    <p className="text-lg md:text-xl mb-8">화상을 입었을 때 가장 먼저 필요한 것을 터치하세요!</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g3', true, "흐르는 차가운 물로 데인 곳을 식히는 연기")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-orange-100">흐르는 물(수도꼭지)</button>
                      <button onClick={() => handleM1Choice('g3', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">연고</button>
                      <button onClick={() => handleM1Choice('g3', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">붕대</button>
                    </div>
                  </div>
                )}
                {activeGroup === 'g4' && !isImageVerifyOpen && !m1Progress.g4 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-gray-700 mb-4">🚨 [4모둠] 앗! 유리 비커가 깨졌다!</h2>
                    <p className="text-lg md:text-xl mb-8">유리 파편을 어떻게 치워야 안전할까요?</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g4', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">재빨리 맨손으로 줍는다</button>
                      <button onClick={() => handleM1Choice('g4', true, "선생님께 알리고 빗자루와 쓰레받기로 쓰는 연기")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-300">선생님께 알리고<br/>빗자루와 쓰레받기로 쓴다</button>
                      <button onClick={() => handleM1Choice('g4', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">진공 청소기로 밀어버린다</button>
                    </div>
                  </div>
                )}
                {activeGroup === 'g5' && !isImageVerifyOpen && !m1Progress.g5 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-purple-600 mb-4">🚨 [5모둠] 알 수 없는 약품의 냄새!</h2>
                    <p className="text-lg md:text-xl mb-8">약품의 냄새를 확인해야 할 때 올바른 행동은?</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g5', true, "코를 직접 대지 않고 손으로 살살 부채질하는 연기")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-purple-100">손으로 살살<br/>부채질을 하여 맡는다</button>
                      <button onClick={() => handleM1Choice('g5', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">코를 비커에 직접 대고 맡는다</button>
                      <button onClick={() => handleM1Choice('g5', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">무슨 맛인지 혀로 맛을 본다</button>
                    </div>
                  </div>
                )}
                {activeGroup === 'g6' && !isImageVerifyOpen && !m1Progress.g6 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-teal-600 mb-4">🚨 [6모둠] 피부에 약품이 묻었다!</h2>
                    <p className="text-lg md:text-xl mb-8">실험 중 실수로 손에 약품이 묻었을 때 가장 먼저 할 일은?</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g6', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">마른 수건으로 빡빡 닦는다</button>
                      <button onClick={() => handleM1Choice('g6', true, "수도꼭지로 달려가 흐르는 물에 깨끗이 씻어내는 연기")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-teal-100">곧바로 흐르는 물에<br/>충분히 씻어낸다</button>
                      <button onClick={() => handleM1Choice('g6', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">알코올 솜으로 소독한다</button>
                    </div>
                  </div>
                )}
                {activeGroup === 'g7' && !isImageVerifyOpen && !m1Progress.g7 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-indigo-600 mb-4">🥽 [7모둠] 실험하기 전 안전 복장!</h2>
                    <p className="text-lg md:text-xl mb-8">실험 전 안전을 위해 반드시 착용해야 할 장비는 무엇일까요?</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g7', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">반팔, 반바지, 슬리퍼</button>
                      <button onClick={() => handleM1Choice('g7', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">모자, 선글라스, 목도리</button>
                      <button onClick={() => handleM1Choice('g7', true, "실험복, 보안경, 장갑을 완벽하게 착용한 늠름한 모습")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-indigo-100">실험복, 보안경, 실험용 장갑</button>
                    </div>
                  </div>
                )}
                {activeGroup === 'g8' && !isImageVerifyOpen && !m1Progress.g8 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-emerald-600 mb-4">🛢️ [8모둠] 사용한 시약 버리기!</h2>
                    <p className="text-lg md:text-xl mb-8">실험 후 남은 시약(약품)은 어디에 버려야 안전할까요?</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g8', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">교실 일반 쓰레기통에 붓는다</button>
                      <button onClick={() => handleM1Choice('g8', true, "실험실에 있는 지정된 폐수통을 찾아서 가리키는 모습")} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-emerald-100">성분별로 지정된 폐수통에 버린다</button>
                      <button onClick={() => handleM1Choice('g8', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">화장실 세면대에 흘려보낸다</button>
                    </div>
                  </div>
                )}

                {/* --- 2모둠 소화담요 흐름 (선택 -> 드래그앤드롭 -> 성공시 isImageVerifyOpen으로 이동) --- */}
                {activeGroup === 'g2' && !isG2DnDOpen && !isImageVerifyOpen && !m1Progress.g2 && (
                  <div className="text-center mt-6">
                    <h2 className="text-2xl md:text-3xl font-black text-red-600 mb-4">🚨 [2모둠] 앗, 불이 났다!</h2>
                    <p className="text-lg md:text-xl mb-8">가장 먼저 가져와야 할 장비를 터치하세요!</p>
                    <div className="flex flex-col md:flex-row justify-center gap-4">
                      <button onClick={() => handleM1Choice('g2', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">보안경</button>
                      <button onClick={() => handleM1Choice('g2', true)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-red-100">소화기</button>
                      <button onClick={() => handleM1Choice('g2', false)} className="p-6 bg-gray-100 rounded-xl border-2 w-full text-lg font-bold hover:bg-gray-200">알코올 램프</button>
                    </div>
                  </div>
                )}

                {/* 2모둠: 드래그 앤 드롭 퍼즐 */}
                {isG2DnDOpen && !m1Progress.g2 && (
                  <div className="text-center mt-6 animate-fade-in">
                    <h2 className="text-2xl font-black text-red-600 mb-4">🔥 [2모둠] 소화기 사용 순서 맞추기</h2>

                    <div className="max-w-xl mx-auto space-y-3 relative mb-6">
                      {dndItems.map((item, index) => (
                        <div
                          key={item.id}
                          data-index={index}
                          draggable
                          onDragStart={(e) => handleDragStart(e, index)}
                          onDragEnter={(e) => handleDragEnter(e, index)}
                          onDragEnd={handleDragEnd}
                          onTouchStart={(e) => handleTouchStart(e, index)}
                          onTouchMove={handleTouchMove}
                          onTouchEnd={handleTouchEnd}
                          className={`drag-item p-5 bg-white border-2 border-red-200 rounded-xl shadow-sm text-lg font-bold flex items-center gap-4 cursor-grab active:cursor-grabbing select-none

                          <div className="text-2xl text-red-300 cursor-grab">↕</div>

                            setM1Message('');
                          }}

                        <span>📸</span> 모둠 사진 미션!
                      </h3>
                      <p className="text-lg font-bold text-gray-700 break-keep">
                        모둠원들이 함께 모여 <br/><span className="text-indigo-600 bg-indigo-100 px-2 py-1 rounded">[{currentActionText}]</span><br/> 모습을 사진으로 찍어주세요!
                      </p>
                    </div>

                    {!isCameraActive && !capturedImg && !imageCheckResult.includes('성공') && !imageCheckResult.includes('완료') && (
                      <div className="flex flex-col sm:flex-row justify-center gap-4">
                        <Button onClick={startCamera} className="bg-blue-600 hover:bg-blue-700 text-white">📷 카메라 켜기</Button>
                        <Button onClick={handleTeacherBypass} className="bg-gray-500 hover:bg-gray-600 text-white">🧑‍🏫 선생님이 직접 확인하기</Button>
                      </div>
                    )}

                    {cameraError && (
                      <div className="mt-4 p-4 bg-red-100 text-red-800 rounded-lg border border-red-300 font-bold">
                        카메라를 사용할 수 없습니다. 브라우저 설정에서 카메라 권한을 허용해주세요.<br/>
                        또는 '선생님이 직접 확인하기' 버튼을 이용하세요.
                      </div>
                    )}

                    {isCameraActive && (
                      <div className="flex flex-col items-center gap-4 mt-6">
                        <div className="relative rounded-2xl overflow-hidden shadow-lg border-4 border-indigo-200 bg-black max-w-lg w-full">
                          <video ref={videoRef} autoPlay playsInline className="w-full h-auto" />
                        </div>
                        <Button onClick={takePhotoAndCheck} className="bg-red-500 hover:bg-red-600 text-white text-xl px-10 py-4 w-full max-w-lg rounded-full animate-pulse shadow-xl">
                          찰칵! 사진 찍기 📸
                        </Button>
                      </div>
                    )}

                    {capturedImg && (
                      <div className="flex flex-col items-center gap-6 mt-6">
                        <div className="relative rounded-2xl overflow-hidden shadow-lg border-4 border-indigo-400 max-w-lg w-full bg-black">
                          <img src={capturedImg} alt="촬영된 사진" className="w-full h-auto object-contain" />
                        </div>
                        
                        {!isImageChecking && !imageCheckResult.includes('성공') && !imageCheckResult.includes('완료') && (
                          <div className="flex gap-4 w-full max-w-lg">
                            <Button onClick={retakePhoto} className="flex-1 bg-gray-500 hover:bg-gray-600 text-white">다시 찍기 🔄</Button>
                            <Button onClick={submitPhoto} className="flex-1 bg-green-500 hover:bg-green-600 text-white shadow-lg">AI 요정에게 제출 ✨</Button>
                          </div>
                        )}

                        {isImageChecking && (
                          <div className="text-indigo-600 font-bold text-xl animate-pulse mt-4 bg-indigo-50 px-6 py-3 rounded-full border border-indigo-200">
                            AI 요정이 사진을 분석 중입니다... 🧚‍♀️🔍
                          </div>
                        )}
                      </div>
                    )}

                    {(imageCheckResult.includes('성공') || imageCheckResult.includes('완료')) && (
                      <div className="flex justify-center mt-8 animate-bounce">
                        <Button 
                          onClick={completeGroupMission} 
                          className="bg-green-600 hover:bg-green-700 text-white px-10 py-4 text-xl rounded-full shadow-xl border-4 border-green-300"
                        >
                          🎉 미션 성공! 모둠 복습하러 가기 ▶️
                        </Button>
                      </div>
                    )}

                    <MessageBox message={m1Message || imageCheckResult} type={(imageCheckResult.includes('성공') || imageCheckResult.includes('완료')) ? 'success' : 'error'} />
                  </div>
                )}
              </div>
            )}

            {isAllComplete && (
              <div className="mt-12 text-center animate-fade-in bg-green-50 p-8 rounded-3xl border-4 border-green-400 shadow-xl">
                {isM3Solved ? (
                  <>
                    <h2 className="text-3xl font-black text-green-700 mb-4">📖 실험실 복습 중</h2>
                    <p className="text-xl text-gray-700 mb-6 font-bold">8개 모둠의 미션을 자유롭게 눌러서 복습하세요!</p>
                    <Button 
                      onClick={() => { setActiveGroup(null); setCurrentScreen('certificate'); }}
                      className="bg-yellow-500 hover:bg-yellow-600 text-white text-xl px-10 py-4 mx-auto w-full md:w-auto rounded-full shadow-lg"
                    >
                      명예의 전당으로 돌아가기 🏆
                    </Button>
                  </>
                ) : (
                  <>
                    <h2 className="text-3xl font-black text-green-700 mb-4">🎉 제1의 방 미션 완료! 🎉</h2>
                    <p className="text-xl text-gray-700 mb-6 font-bold">모든 모둠이 위기 대처법을 완벽히 익혔습니다!<br/>이제 다음 방의 문이 열립니다.</p>
                    <Button 
                      onClick={() => {
                        setActiveGroup(null);
                        setCurrentScreen('mission2');
                      }}
                      className="bg-green-600 hover:bg-green-700 text-white text-xl px-10 py-4 mx-auto w-full md:w-auto rounded-full shadow-lg"
                    >
                      다음 방으로 이동 🚪▶️
                    </Button>
                  </>
                )}
              </div>
            )}
          </div>
        );
      };

      const renderMission2 = () => {
        const questions = [
          { q: "1. 숲속에서 예쁜 벌집을 발견하면 막대기로 톡톡 건드려본다.", ans: false },
          { q: "2. 등산 중 길가에 있는 색깔이 예쁜 버섯은 따서 먹어도 된다.", ans: false },
          { q: "3. 여름에 숲에 갈 때도 벌레에 물리지 않게 얇은 긴소매 옷과 긴바지를 입는 것이 좋다.", ans: true },
          { q: "4. 산이나 숲에 갈 때는 모기나 진드기 기피제를 뿌리면 도움이 된다.", ans: true },
          { q: "5. 바위 밑이나 풀숲에서 뱀을 만나면 귀여우니까 손으로 만져본다.", ans: false },
          { q: "6. 산에서는 정해진 탐방로(길)로만 다녀야 길을 잃지 않고 안전하다.", ans: true }
        ];

        return (
          <div className="max-w-4xl mx-auto px-4 py-8 animate-fade-in">
            <TitleBox 
              title="제2의 방: 고요한 숲속의 시험" 
              subtitle="야외 활동 시 지켜야 할 안전 수칙입니다. O, X 퀴즈를 모두 맞혀주세요!"
              icon="🌲"
            />

            {!randomCondition ? (
              <div className="bg-white p-8 rounded-3xl shadow-lg border-4 border-green-200 text-center">
                <h2 className="text-2xl font-black text-green-700 mb-6">누가 미션을 시작할까요?</h2>
                <Button onClick={pickRandomCondition} className="bg-green-500 hover:bg-green-600 text-white mx-auto text-xl py-4 px-8 rounded-full">
                  대표 뽑기 돌림판 🎲
                </Button>
              </div>
            ) : (
              <div className="animate-fade-in space-y-8">
                <div className="bg-yellow-100 p-6 rounded-2xl border-2 border-yellow-300 text-center shadow-md">
                  <h3 className="text-xl font-bold text-gray-700 mb-2">미션을 수행할 대표는...</h3>
                  <div className="text-2xl md:text-3xl font-black text-indigo-700">{randomCondition}</div>
                  <p className="mt-3 text-sm text-gray-500 font-bold">해당하는 친구가 여러 명이면 가위바위보로 1명을 정하세요!</p>
                </div>

                <div className="bg-white p-6 rounded-3xl shadow-xl border-4 border-green-300">
                  <div className="grid gap-4">
                    {questions.map((item, idx) => (
                      <div key={idx} className="bg-gray-50 p-4 md:p-5 rounded-2xl border-2 border-gray-100 flex flex-col md:flex-row justify-between items-center gap-4 hover:border-green-200 transition-colors">
                        <p className="text-lg font-bold text-gray-800 break-keep flex-1">{item.q}</p>
                        <div className="flex gap-3 w-full md:w-auto">
                          <Button 
                            onClick={() => handleM2Answer(idx, true)}
                            className={`flex-1 md:w-24 ${m2Answers[idx] === true ? 'bg-blue-500 text-white' : 'bg-gray-200 text-gray-600 hover:bg-blue-100'}`}
                            disabled={isM2Solved}
                          >⭕ O</Button>
                          <Button 
                            onClick={() => handleM2Answer(idx, false)}
                            className={`flex-1 md:w-24 ${m2Answers[idx] === false ? 'bg-red-500 text-white' : 'bg-gray-200 text-gray-600 hover:bg-red-100'}`}
                            disabled={isM2Solved}
                          >❌ X</Button>
                        </div>
                      </div>
                    ))}
                  </div>

                  <MessageBox message={m2Message} type={isM2Solved ? 'success' : 'error'} />

                  {isM2Solved && (
                    <div className="mt-8 flex justify-center animate-bounce">
                      <Button onClick={() => setCurrentScreen('mission3')} className="bg-green-600 hover:bg-green-700 text-white text-xl px-10 py-4 rounded-full shadow-lg">
                        마지막 방으로 이동 🚪▶️
                      </Button>
                    </div>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      };

      const renderMission3 = () => (
        <div className="max-w-4xl mx-auto px-4 py-8 animate-fade-in">
          <TitleBox 
            title="제3의 방: 해커방 (디지털 금고)" 
            subtitle="해커방의 암호를 풀면 최종 탈출입니다! 힌트 요정에게 도움을 요청하세요."
            icon="💻"
          />

          <div className="grid md:grid-cols-2 gap-6">
            {/* 힌트 요정 영역 */}
            <div className="bg-indigo-50 p-6 md:p-8 rounded-3xl shadow-lg border-4 border-indigo-200 flex flex-col h-full">
              <h2 className="text-2xl font-black text-indigo-800 mb-4 flex items-center gap-2">🧚‍♀️ AI 힌트 요정</h2>
              <p className="text-gray-700 font-bold mb-4 break-keep">
                온라인에서 내 개인정보(이름, 사진, 주소 등)를 올릴 때나 결제를 할 때는 반드시 부모님의 <strong className="text-red-500 text-xl">OO</strong>을/를 받아야 합니다. 
              </p>
              
              <div className="mt-auto bg-white p-4 rounded-2xl border-2 border-indigo-100 mb-4">
                <p className="text-sm font-bold text-gray-500 mb-2">어떤 스타일로 힌트를 줄까요? (예: 할아버지, 랩퍼, 아기)</p>
                <div className="flex gap-2">
                  <input 
                    type="text" 
                    className="flex-1 p-3 rounded-xl border-2 border-gray-200 focus:border-indigo-400 focus:ring focus:ring-indigo-100 outline-none font-bold"
                    placeholder="스타일 입력..."
                    value={hintStyle}
                    onChange={e => setHintStyle(e.target.value)}
                    onKeyPress={e => e.key === 'Enter' && getAiHint()}
                  />
                  <Button onClick={getAiHint} disabled={isHintLoading} className="bg-indigo-500 hover:bg-indigo-600 text-white whitespace-nowrap">
                    {isHintLoading ? '생성중..' : '힌트 받기'}
                  </Button>
                </div>
              </div>

              {aiHint && (
                <div className="bg-white p-4 rounded-2xl shadow-inner border border-indigo-100 whitespace-pre-wrap text-indigo-900 font-bold animate-fade-in mt-2 relative">
                  <div className="absolute -top-3 -left-3 text-2xl">✨</div>
                  {aiHint}
                </div>
              )}
            </div>

            {/* 암호 입력 영역 */}
            <div className="bg-white p-6 md:p-8 rounded-3xl shadow-lg border-4 border-gray-300 flex flex-col justify-center items-center text-center">
              <div className="text-6xl mb-6">🔒</div>
              <h2 className="text-2xl font-black text-gray-800 mb-6">금고 암호 (두 글자)</h2>
              
              <input 
                type="text" 
                className="w-full max-w-[200px] text-center text-3xl p-4 rounded-xl border-4 border-gray-200 focus:border-blue-500 outline-none font-black mb-6 tracking-widest"
                placeholder="OO"
                maxLength={2}
                value={m3Input}
                onChange={e => setM3Input(e.target.value)}
                onKeyPress={e => e.key === 'Enter' && handleM3Submit()}
                disabled={isM3Solved}
              />
              
              {!isM3Solved && (
                <Button onClick={handleM3Submit} className="bg-gray-800 hover:bg-gray-900 text-white px-10 py-3 rounded-full w-full max-w-[200px]">
                  입력
                </Button>
              )}

              <MessageBox message={m3Message} type={isM3Solved ? 'success' : 'error'} />

              {isM3Solved && (
                <Button onClick={() => setCurrentScreen('certificate')} className="mt-6 bg-blue-600 hover:bg-blue-700 text-white text-xl px-8 py-4 rounded-full shadow-lg animate-bounce w-full">
                  명예의 전당으로 🏆
                </Button>
              )}
            </div>
          </div>
        </div>
      );

      const renderCertificate = () => (
        <div className="max-w-4xl mx-auto px-4 py-8 animate-fade-in">
          <div className="bg-gradient-to-br from-yellow-50 to-orange-50 p-8 md:p-12 rounded-[2rem] shadow-2xl border-8 border-yellow-300 text-center relative overflow-hidden">
            {/* 장식용 요소들 */}
            <div className="absolute top-4 left-4 text-4xl opacity-50">✨</div>
            <div className="absolute top-4 right-4 text-4xl opacity-50">🎉</div>
            <div className="absolute bottom-4 left-4 text-4xl opacity-50">🎈</div>
            <div className="absolute bottom-4 right-4 text-4xl opacity-50">🏅</div>

            <div className="text-[5rem] mb-4 drop-shadow-lg">🏆</div>
            <h1 className="text-4xl md:text-5xl font-black text-yellow-800 mb-4 drop-shadow-sm">임무 완수! 방탈출 성공!</h1>
            <p className="text-xl text-yellow-700 font-bold mb-10">여러분은 이제 비밀 과학 연구소의 정식 연구원입니다.</p>

            <div className="bg-white/80 backdrop-blur p-6 md:p-8 rounded-3xl border-2 border-yellow-200 shadow-md mb-8 max-w-2xl mx-auto">
              <h2 className="text-xl font-black text-gray-800 mb-4">우리 반/모둠만의 특별한 수료증 멘트 만들기</h2>
              <div className="flex flex-col sm:flex-row gap-3">
                <input 
                  type="text" 
                  className="flex-1 p-3 rounded-xl border-2 border-gray-200 focus:border-yellow-400 outline-none font-bold"
                  placeholder="예: 우리 반은 목소리가 크고 웃음이 많아요"
                  value={teamFeature}
                  onChange={e => setTeamFeature(e.target.value)}
                  onKeyPress={e => e.key === 'Enter' && getAiCertificate()}
                />
                <Button onClick={getAiCertificate} disabled={isCertLoading} className="bg-yellow-500 hover:bg-yellow-600 text-white whitespace-nowrap">
                  {isCertLoading ? '작성중..' : '수료증 받기'}
                </Button>
              </div>

              {aiCertificate && (
                <div className="mt-6 p-6 bg-gradient-to-b from-white to-gray-50 border-4 border-double border-yellow-400 rounded-xl shadow-inner text-left relative">
                  <div className="text-center font-black text-2xl mb-4 text-gray-800 border-b-2 border-gray-200 pb-2">안전 수칙 마스터 수료증</div>
                  <p className="whitespace-pre-wrap text-lg font-bold text-gray-700 leading-relaxed text-center break-keep">
                    {aiCertificate}
                  </p>
                  <div className="mt-6 text-right font-bold text-gray-500">
                    - 비밀 과학 연구소 최고 소장 올림 -
                  </div>
                  {/* 스탬프 효과 */}
                  <div className="absolute bottom-4 left-4 w-16 h-16 border-4 border-red-500 rounded-full flex items-center justify-center text-red-500 font-black transform -rotate-12 opacity-80">
                    합격
                  </div>
                </div>
              )}
            </div>

            {/* 갤러리 섹션 */}
            {savedPhotos.length > 0 && (
              <div className="mt-10 mb-8">
                <h3 className="text-2xl font-black text-gray-800 mb-6 border-b-2 border-yellow-200 pb-2 inline-block">📸 우리의 미션 인증샷</h3>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                  {savedPhotos.map((photo, idx) => (
                    <div key={idx} className="bg-white p-2 rounded-xl shadow-md border-2 border-gray-100 transform rotate-1 hover:rotate-0 transition-transform">
                      <img src={photo.img} alt={`${photo.group}모둠 미션 성공사진`} className="w-full aspect-square object-cover rounded-lg mb-2 bg-black" />
                      <p className="font-bold text-gray-700 text-sm">{photo.group}모둠 성공!</p>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="flex flex-col sm:flex-row justify-center gap-4 mt-8">
              <Button onClick={() => {
                setActiveGroup(null); // 모둠 선택 상태를 초기화하여 전체 목록 화면으로 이동
                setCurrentScreen('mission1');
              }} className="bg-indigo-600 hover:bg-indigo-700 text-white px-8 py-3 rounded-full shadow-lg">
                실험실로 돌아가서 복습하기 🔄
              </Button>
              <Button onClick={goHome} className="bg-gray-400 hover:bg-gray-500 text-white px-8 py-3 rounded-full text-sm">
                완전히 처음부터 다시 시작 ⚠️
              </Button>
            </div>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen relative font-sans text-gray-800">
          {/* 상단 네비게이션 로고 (선택사항) */}
          <div className="absolute top-6 left-6 z-10 hidden md:block">
            <div className="font-black text-indigo-900 text-xl tracking-wider flex items-center gap-2">
              <span>🔬</span> SCIENCE LAB
            </div>
          </div>

          <div className="pt-16 md:pt-8 pb-16">
            {renderProgressBar()}
            {currentScreen === 'intro' && renderIntro()}
            {currentScreen === 'mission1' && renderMission1()}
            {currentScreen === 'mission2' && renderMission2()}
            {currentScreen === 'mission3' && renderMission3()}
            {currentScreen === 'certificate' && renderCertificate()}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
